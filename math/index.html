<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFEBD0">
<title>산수 놀이터</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/voice-settings.css">
<link rel="stylesheet" href="../shared/time-limit.css">
<link rel="stylesheet" href="../shared/pet.css">
</head>
<body>

<!-- 홈 -->
<section class="screen on" id="scr-home">
  <header class="home-head">
    <h1>🔢 산수 놀이터</h1>
    <div class="stats">
      <span class="stat">⭐ <b id="home-stars">0</b></span>
      <a href="../" class="vs-btn" style="text-decoration:none" aria-label="메인 놀이터로">🏠</a>
      <span id="pet-slot"></span>
      <button type="button" id="btn-voice" class="vs-btn" aria-label="목소리 설정">🗣️</button>
    </div>
  </header>
  <div class="menu" id="menu"></div>
</section>

<!-- 숫자 따라쓰기: 묶음 목록 -->
<section class="screen" id="scr-groups">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2>✏️ 숫자 따라쓰기</h2>
  </header>
  <div class="items-list" id="groups-list"></div>
</section>

<!-- 숫자 따라쓰기 -->
<section class="screen" id="scr-trace">
  <header class="bar">
    <button type="button" class="back" id="btn-groups-back">◀</button>
    <h2 id="trace-title">✏️ 7 쓰기</h2>
    <span class="page-count" id="trace-count">1 / 10</span>
  </header>
  <button type="button" class="side-nav prev" id="btn-tprev" aria-label="이전 숫자">◀</button>
  <button type="button" class="side-nav next" id="btn-tnext" aria-label="다 쓰고 다음 숫자">▶</button>
  <div class="trace-stage">
    <div class="page-head">
      <button type="button" class="bigbtn" id="btn-tlisten">🔊 듣기</button>
      <div class="pen-hint" id="pen-hint">✏️ 펜슬로 써 보세요!</div>
    </div>
    <div class="trace-visual" id="trace-visual"></div>
    <div class="note" id="trace-holder">
      <div class="note-line">
        <span class="line-tag">따라 써요</span>
        <canvas id="ink-trace"></canvas>
        <button type="button" class="line-clear" id="btn-tclear" aria-label="지우기">🧽</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="swatches" id="swatches">
        <button type="button" class="swatch" aria-label="분홍"></button>
        <button type="button" class="swatch" aria-label="파랑"></button>
        <button type="button" class="swatch" aria-label="초록"></button>
        <button type="button" class="swatch" aria-label="노랑"></button>
        <button type="button" class="swatch sw-rb" aria-label="무지개"></button>
      </div>
      <button type="button" class="bigbtn" id="btn-tundo">↩️ 한 획</button>
    </div>
  </div>
</section>

<!-- 문제: 단계 고르기 -->
<section class="screen" id="scr-levels">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2 id="levels-title">➕ 덧셈 문제</h2>
  </header>
  <div class="items-list" id="levels-list"></div>
</section>

<!-- 숫자 징검다리 -->
<section class="screen" id="scr-stones">
  <header class="bar">
    <button type="button" class="back" id="btn-stones-back">◀</button>
    <h2>🐸 숫자 징검다리</h2>
    <span class="dots" id="stones-dots"></span>
  </header>
  <div class="stones-stage">
    <div class="stones-task" id="stones-task"></div>
    <div class="stones-wrap">
      <div class="frog" id="frog">🐸</div>
      <div class="stones-row" id="stones-row"></div>
    </div>
    <div class="quiz-expr stones-expr" id="stones-expr" hidden></div>
    <button type="button" class="bigbtn primary big-next" id="btn-snext" hidden>알겠어! 다음 ▶</button>
  </div>
</section>

<!-- 문제 풀기 -->
<section class="screen" id="scr-quiz">
  <header class="bar">
    <button type="button" class="back" id="btn-levels-back">◀</button>
    <h2 id="quiz-title">➕ 덧셈 문제</h2>
    <span class="dots" id="quiz-dots"></span>
  </header>
  <div class="quiz-stage">
    <div class="quiz-visual" id="quiz-visual" hidden></div>
    <div class="quiz-expr" id="quiz-expr"></div>
    <div class="quiz-choices" id="quiz-choices"></div>
    <button type="button" class="bigbtn" id="btn-hint">💡 그림으로 보기</button>
    <button type="button" class="bigbtn primary big-next" id="btn-qnext" hidden>알겠어! 다음 ▶</button>
  </div>
</section>

<!-- 수 세기 맞춤 -->
<section class="screen" id="scr-count">
  <header class="bar">
    <button type="button" class="back" id="btn-count-back">◀</button>
    <h2>🔢 수 세기</h2>
    <span class="dots" id="count-dots"></span>
  </header>
  <div class="quiz-stage">
    <div class="quiz-visual big" id="count-visual"></div>
    <div class="quiz-choices" id="count-choices"></div>
    <button type="button" class="bigbtn primary big-next" id="btn-cnext" hidden>알겠어! 다음 ▶</button>
  </div>
</section>

<!-- 숫자표 빈칸 채우기 -->
<section class="screen" id="scr-chart">
  <header class="bar">
    <button type="button" class="back" id="btn-chart-back">◀</button>
    <h2>💯 숫자표 채우기</h2>
    <span class="page-count" id="chart-left">빈칸 0</span>
  </header>
  <div class="chart-stage">
    <div class="chart-grid" id="chart-grid"></div>
    <div class="quiz-choices chart-choices" id="chart-choices" hidden></div>
  </div>
</section>

<!-- 패턴 이어가기 -->
<section class="screen" id="scr-pattern">
  <header class="bar">
    <button type="button" class="back" id="btn-pattern-back">◀</button>
    <h2>🚂 패턴 이어가기</h2>
    <span class="dots" id="pattern-dots"></span>
  </header>
  <div class="pattern-stage">
    <div class="train-wrap">
      <div class="train" id="train"></div>
    </div>
    <button type="button" class="bigbtn" id="btn-pread">🔊 다시 듣기</button>
    <div class="quiz-choices pattern-choices" id="pattern-choices"></div>
    <button type="button" class="bigbtn primary big-next" id="btn-pnext" hidden>알겠어! 다음 ▶</button>
  </div>
</section>

<!-- 점 잇기 -->
<section class="screen" id="scr-dots">
  <header class="bar">
    <button type="button" class="back" id="btn-dots-back">◀</button>
    <h2 id="dots-title">✨ 점 잇기</h2>
    <span class="page-count" id="dots-count">0 / 0</span>
  </header>
  <div class="dots-stage">
    <svg id="dots-svg" viewBox="-9 -9 118 118" aria-label="점 잇기 그림판"></svg>
  </div>
</section>

<!-- 보상 오버레이 -->
<div class="reward" id="reward">
  <div class="reward-card">
    <div class="reward-stars">⭐</div>
    <div class="reward-praise" id="reward-praise">참 잘했어요!</div>
    <div class="reward-btns">
      <button type="button" class="bigbtn" id="reward-close" hidden>그만할래</button>
      <button type="button" class="bigbtn primary" id="reward-next">다음 ▶</button>
    </div>
  </div>
</div>

<script src="../shared/profile.js"></script>
<script src="js/data.js"></script>
<script src="js/dots.js"></script>
<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/ink.js"></script>
<script src="js/app.js"></script>
<script src="../shared/parent-settings.js"></script>
<script src="../shared/voice-settings.js"></script>
<script src="../shared/pet-avatar.js"></script>
<script src="../shared/pet.js"></script>
<script src="../shared/time-limit.js"></script>
<script src="../shared/sw-register.js"></script>
</body>
</html>
