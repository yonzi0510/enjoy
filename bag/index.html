<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F6ECDD">
<title>생각 놀이터</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/voice-settings.css">
<link rel="stylesheet" href="../shared/time-limit.css">
<link rel="stylesheet" href="../shared/pet.css">
</head>
<body>

<!-- 홈 -->
<section class="screen on" id="scr-home">
  <header class="home-head">
    <h1>🎒 생각 놀이터</h1>
    <div class="stats">
      <span class="stat">⭐ <b id="home-stars">0</b></span>
      <a href="../" class="vs-btn" style="text-decoration:none" aria-label="메인 놀이터로">🏠</a>
      <span id="pet-slot"></span>
      <button type="button" id="btn-voice" class="vs-btn" aria-label="목소리 설정">🗣️</button>
    </div>
  </header>
  <div class="menu" id="menu"></div>
</section>

<!-- 도안 목록 -->
<section class="screen" id="scr-list">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2 id="list-title">🥄 요리조리 숟가락</h2>
  </header>
  <div class="items-list" id="play-list"></div>
</section>

<!-- 숟가락 놀이 -->
<section class="screen" id="scr-spoon">
  <header class="bar">
    <button type="button" class="back" id="btn-spoon-back">◀</button>
    <h2 id="spoon-title">🥄 요리조리 숟가락</h2>
    <span class="page-count" id="spoon-count">0 / 3</span>
  </header>
  <div class="play-wrap">
    <div class="sample-card">
      <div class="sample-tag">본보기 👀</div>
      <svg class="sample-svg" id="spoon-sample" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="board-wrap">
      <svg id="spoon-stage" viewBox="0 0 100 138" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </div>
</section>

<!-- 빨대 놀이 -->
<section class="screen" id="scr-straw">
  <header class="bar">
    <button type="button" class="back" id="btn-straw-back">◀</button>
    <h2 id="straw-title">🎚️ 요리조리 빨대</h2>
    <span class="page-count" id="straw-count">0 / 3</span>
  </header>
  <div class="play-wrap">
    <div class="sample-card">
      <div class="sample-tag">본보기 👀</div>
      <svg class="sample-svg" id="straw-sample" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="board-wrap">
      <svg id="straw-stage" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </div>
</section>

<!-- 네모 조각 놀이 -->
<section class="screen" id="scr-square">
  <header class="bar">
    <button type="button" class="back" id="btn-square-back">◀</button>
    <h2 id="square-title">🟧 네모 조각 맞추기</h2>
    <span class="page-count" id="square-count">0 / 4</span>
  </header>
  <div class="play-wrap">
    <div class="sample-card">
      <div class="sample-tag">본보기 👀</div>
      <svg class="sample-svg" id="square-sample" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="board-wrap">
      <svg id="square-stage" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </div>
</section>

<!-- 요리조리 풍선 줄 놀이 — 본보기 풍선 카드의 줄 모양을 보고 똑같이 그리는 운필력 놀이 -->
<section class="screen" id="scr-balloon">
  <header class="bar">
    <button type="button" class="back" id="btn-balloon-back">◀</button>
    <h2 id="balloon-title">🎈 요리조리 풍선 줄</h2>
    <span class="dots" id="balloon-dots"></span>
  </header>
  <button type="button" class="side-nav prev" id="balloon-prev" aria-label="이전 풍선">◀</button>
  <button type="button" class="side-nav next" id="balloon-next" aria-label="다 그리고 다음 풍선">▶</button>
  <div class="bl-stage">
    <div class="bl-cards">
      <div class="bl-card" id="balloon-sample-card">
        <span class="bl-tag">👀 본보기</span>
        <canvas id="balloon-sample"></canvas>
      </div>
      <div class="bl-card mine" id="balloon-mine">
        <span class="bl-tag mine">✏️ 내 풍선</span>
        <canvas id="balloon-pad"></canvas>
        <button type="button" class="line-clear" id="balloon-clear" aria-label="내 줄 지우기">🧽</button>
        <span class="bl-fly" id="balloon-fly" hidden>🎈</span>
      </div>
    </div>
    <div class="bl-toolbar">
      <button type="button" class="bigbtn" id="btn-balloon-listen">🔊 듣기</button>
      <div class="swatches" id="balloon-swatches"></div>
      <button type="button" class="bigbtn" id="btn-balloon-eraser">🧼 지우개</button>
      <button type="button" class="bigbtn" id="btn-balloon-undo">↩️ 한 획</button>
    </div>
  </div>
</section>

<!-- 색종이 축하 -->
<div id="confetti" aria-hidden="true"></div>

<!-- 보상 오버레이 -->
<div class="reward" id="reward">
  <div class="reward-card">
    <div class="reward-stars">⭐</div>
    <div class="reward-praise" id="reward-praise">참 잘했어요!</div>
    <div class="reward-btns">
      <button type="button" class="bigbtn" id="reward-close" hidden>그만할래</button>
      <button type="button" class="bigbtn primary" id="reward-next">다음 ▶</button>
    </div>
  </div>
</div>

<script src="../shared/profile.js"></script>
<script src="js/data.js"></script>
<script src="js/ink.js"></script>
<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/app.js"></script>
<script src="../shared/parent-settings.js"></script>
<script src="../shared/voice-settings.js"></script>
<script src="../shared/pet-avatar.js"></script>
<script src="../shared/pet.js"></script>
<script src="../shared/time-limit.js"></script>
<script src="../shared/sw-register.js"></script>
</body>
</html>
