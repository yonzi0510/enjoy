<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFF3D6">
<title>글씨 놀이터</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/voice-settings.css">
<link rel="stylesheet" href="../shared/time-limit.css">
<link rel="stylesheet" href="../shared/pet.css">
</head>
<body>

<!-- 홈 -->
<section class="screen on" id="scr-home">
  <header class="home-head">
    <h1>✍️ 글씨 놀이터</h1>
    <div class="stats">
      <span class="stat">⭐ <b id="home-stars">0</b></span>
      <a href="../" class="vs-btn" style="text-decoration:none" aria-label="메인 놀이터로">🏠</a>
      <span id="pet-slot"></span>
      <button type="button" id="btn-voice" class="vs-btn" aria-label="목소리 설정">🗣️</button>
    </div>
  </header>
  <div class="menu" id="menu"></div>
</section>

<!-- 동요·동화 목록 -->
<section class="screen" id="scr-items">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2 id="items-title">🎵 동요 필사</h2>
  </header>
  <div class="items-list" id="items-list"></div>
</section>

<!-- 물어보고 쓰기 -->
<section class="screen" id="scr-ask">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2>🎤 물어보고 쓰기</h2>
    <button type="button" class="navbtn" id="ask-clear" aria-label="물어본 낱말 지우기" hidden>🧹</button>
  </header>
  <div class="ask-stage">
    <button type="button" class="ask-mic" id="ask-mic">🎤</button>
    <p class="ask-status" id="ask-status">마이크를 누르고 "토끼는 어떻게 써?" 하고 물어보세요</p>
    <div class="ask-recent" id="ask-recent"></div>
    <div class="ask-typebox">
      <input type="text" id="ask-type" maxlength="8" placeholder="낱말 직접 쓰기" autocomplete="off">
      <button type="button" class="bigbtn primary" id="ask-type-go">써 볼래! ✏️</button>
    </div>
  </div>
</section>

<!-- 필사 -->
<section class="screen" id="scr-write">
  <header class="bar">
    <button type="button" class="back" id="btn-write-back">◀</button>
    <h2 id="write-title">✏️ 자음 쓰기</h2>
    <span class="dots" id="write-dots"></span>
  </header>
  <!-- 글자를 다 쓰고 ▶ 를 누르면 확인·보상까지 이어진다 (글 모르는 아이용 직관 UI) -->
  <button type="button" class="side-nav prev" id="btn-prev" aria-label="이전 장">◀</button>
  <button type="button" class="side-nav next" id="btn-next" aria-label="다 쓰고 다음 장">▶</button>
  <div class="write-stage">
    <div class="page-head">
      <span class="page-emoji" id="write-emoji">✏️</span>
      <button type="button" class="bigbtn" id="btn-listen">🔊 듣기</button>
      <div class="pen-hint" id="pen-hint">✏️ 펜슬로 써 보세요!</div>
    </div>
    <div class="note">
      <div class="note-line" id="line-trace">
        <span class="line-tag" id="tag-trace">따라 써요</span>
        <canvas id="ink-trace"></canvas>
        <button type="button" class="line-clear" id="clear-trace" aria-label="윗줄 지우기">🧽</button>
      </div>
      <div class="note-line" id="line-free">
        <span class="line-tag free" id="tag-free">혼자 써요</span>
        <canvas id="ink-free"></canvas>
        <button type="button" class="line-clear" id="clear-free" aria-label="아랫줄 지우기">🧽</button>
      </div>
    </div>
    <div class="dict-check" id="dict-check">
      <span class="dc-msg">정답이랑 똑같이 썼는지 비교해 보세요!</span>
      <button type="button" class="bigbtn" id="dict-retry">✏️ 다시 쓸래</button>
      <button type="button" class="bigbtn primary" id="dict-ok">⭕ 맞았어요!</button>
    </div>
    <div class="toolbar">
      <div class="swatches" id="swatches"></div>
      <button type="button" class="bigbtn" id="btn-eraser">🧼 지우개</button>
      <button type="button" class="bigbtn" id="btn-undo">↩️ 한 획</button>
    </div>
  </div>
</section>

<!-- 요리조리 풍선 줄 — 본보기 풍선 카드의 줄 모양을 보고 똑같이 그리는 운필력 놀이 -->
<section class="screen" id="scr-balloon">
  <header class="bar">
    <button type="button" class="back" id="btn-balloon-back">◀</button>
    <h2 id="balloon-title">🎈 요리조리 풍선 줄</h2>
    <span class="dots" id="balloon-dots"></span>
  </header>
  <button type="button" class="side-nav prev" id="balloon-prev" aria-label="이전 풍선">◀</button>
  <button type="button" class="side-nav next" id="balloon-next" aria-label="다 그리고 다음 풍선">▶</button>
  <div class="bl-stage">
    <div class="bl-cards">
      <div class="bl-card" id="balloon-sample-card">
        <span class="bl-tag">👀 본보기</span>
        <canvas id="balloon-sample"></canvas>
      </div>
      <div class="bl-card mine" id="balloon-mine">
        <span class="bl-tag mine">✏️ 내 풍선</span>
        <canvas id="balloon-pad"></canvas>
        <button type="button" class="line-clear" id="balloon-clear" aria-label="내 줄 지우기">🧽</button>
        <span class="bl-fly" id="balloon-fly" hidden>🎈</span>
      </div>
    </div>
    <div class="toolbar bl-toolbar">
      <button type="button" class="bigbtn" id="btn-balloon-listen">🔊 듣기</button>
      <div class="swatches" id="balloon-swatches"></div>
      <button type="button" class="bigbtn" id="btn-balloon-eraser">🧼 지우개</button>
      <button type="button" class="bigbtn" id="btn-balloon-undo">↩️ 한 획</button>
    </div>
  </div>
</section>

<!-- 자유 낙서장 — 도화지가 메인, 도구는 가장자리 단추를 누르면 드롭판으로 펼쳐진다 -->
<section class="screen" id="scr-draw">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2>🎨 자유 낙서장</h2>
  </header>
  <div class="draw-wrap">
    <!-- 도구 단추 줄 (세로: 위쪽, 가로: 오른쪽 열) — 단추에 현재 선택이 보인다 -->
    <div class="draw-dock" id="draw-dock">
      <button type="button" class="dock-btn" id="dock-color" aria-label="색 고르기"><span class="dock-chip" id="dock-color-chip"></span></button>
      <button type="button" class="dock-btn" id="dock-pen" aria-label="펜 고르기">🖊️</button>
      <button type="button" class="dock-btn" id="btn-draw-sticker" aria-label="스티커 고르기">⭐</button>
      <button type="button" class="dock-btn" id="btn-draw-eraser" aria-label="지우개">🧼</button>
      <button type="button" class="dock-btn" id="btn-draw-undo" aria-label="한 번 되돌리기">↩️</button>
      <button type="button" class="dock-btn" id="btn-draw-clear" aria-label="다 지우기">🗑️</button>
      <button type="button" class="dock-btn save" id="btn-draw-save" aria-label="보관하기">💾</button>
    </div>
    <!-- 도화지 (메인 — 화면을 최대한 크게 쓴다) -->
    <div class="draw-holder">
      <canvas id="draw-pad"></canvas>
    </div>
    <!-- 드롭판 — 단추를 누르면 펼쳐지고, 고르거나 도화지를 누르면 닫힌다 -->
    <div class="draw-drop" id="drop-color" hidden><div class="swatches" id="draw-swatches"></div></div>
    <div class="draw-drop" id="drop-pen" hidden>
      <div class="pens">
        <button type="button" class="pen-btn" data-pen="thin" aria-label="가는 펜">✏️</button>
        <button type="button" class="pen-btn on" data-pen="mid" aria-label="보통 펜">🖊️</button>
        <button type="button" class="pen-btn" data-pen="thick" aria-label="굵은 크레용">🖍️</button>
        <button type="button" class="pen-btn" data-pen="hl" aria-label="형광펜">🖌️</button>
      </div>
    </div>
    <div class="draw-drop" id="drop-sticker" hidden><div class="sticker-row" id="sticker-row"></div></div>
  </div>
</section>

<!-- 갤러리 -->
<section class="screen" id="scr-gallery">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2>🖼️ 내 글씨</h2>
    <span class="stat" id="gallery-count">0장</span>
  </header>
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<!-- 보상 오버레이 -->
<div class="reward" id="reward">
  <div class="reward-card">
    <div class="reward-stars">⭐</div>
    <div class="reward-praise" id="reward-praise">참 잘했어요!</div>
    <div class="reward-btns">
      <button type="button" class="bigbtn" id="reward-again">한 번 더 ✏️</button>
      <button type="button" class="bigbtn primary" id="reward-next">다음 ▶</button>
    </div>
  </div>
</div>

<script src="../shared/profile.js"></script>
<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/ask.js"></script>
<script src="js/ink.js"></script>
<script src="js/app.js"></script>
<script src="../shared/parent-settings.js"></script>
<script src="../shared/voice-settings.js"></script>
<script src="../shared/pet-avatar.js"></script>
<script src="../shared/pet.js"></script>
<script src="../shared/time-limit.js"></script>
<script src="../shared/sw-register.js"></script>
</body>
</html>
