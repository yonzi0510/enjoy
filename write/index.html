<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFF3D6">
<title>글씨 놀이터</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/voice-settings.css">
</head>
<body>

<!-- 홈 -->
<section class="screen on" id="scr-home">
  <header class="home-head">
    <h1>✍️ 글씨 놀이터</h1>
    <div class="stats">
      <span class="stat">⭐ <b id="home-stars">0</b></span>
      <a href="../" class="vs-btn" style="text-decoration:none" aria-label="메인 놀이터로">🏠</a>
      <button type="button" id="btn-voice" class="vs-btn" aria-label="목소리 설정">🗣️</button>
    </div>
  </header>
  <div class="menu" id="menu"></div>
</section>

<!-- 동요·동화 목록 -->
<section class="screen" id="scr-items">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2 id="items-title">🎵 동요 필사</h2>
  </header>
  <div class="items-list" id="items-list"></div>
</section>

<!-- 물어보고 쓰기 -->
<section class="screen" id="scr-ask">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2>🎤 물어보고 쓰기</h2>
    <button type="button" class="navbtn" id="ask-clear" aria-label="물어본 낱말 지우기" hidden>🧹</button>
  </header>
  <div class="ask-stage">
    <button type="button" class="ask-mic" id="ask-mic">🎤</button>
    <p class="ask-status" id="ask-status">마이크를 누르고 "토끼는 어떻게 써?" 하고 물어보세요</p>
    <div class="ask-recent" id="ask-recent"></div>
    <div class="ask-typebox">
      <input type="text" id="ask-type" maxlength="8" placeholder="낱말 직접 쓰기" autocomplete="off">
      <button type="button" class="bigbtn primary" id="ask-type-go">써 볼래! ✏️</button>
    </div>
  </div>
</section>

<!-- 필사 -->
<section class="screen" id="scr-write">
  <header class="bar">
    <button type="button" class="back" id="btn-write-back">◀</button>
    <h2 id="write-title">✏️ 자음 쓰기</h2>
    <span class="dots" id="write-dots"></span>
  </header>
  <!-- 글자를 다 쓰고 ▶ 를 누르면 확인·보상까지 이어진다 (글 모르는 아이용 직관 UI) -->
  <button type="button" class="side-nav prev" id="btn-prev" aria-label="이전 장">◀</button>
  <button type="button" class="side-nav next" id="btn-next" aria-label="다 쓰고 다음 장">▶</button>
  <div class="write-stage">
    <div class="page-head">
      <span class="page-emoji" id="write-emoji">✏️</span>
      <button type="button" class="bigbtn" id="btn-listen">🔊 듣기</button>
      <div class="pen-hint" id="pen-hint">✏️ 펜슬로 써 보세요!</div>
    </div>
    <div class="note">
      <div class="note-line" id="line-trace">
        <span class="line-tag" id="tag-trace">따라 써요</span>
        <canvas id="ink-trace"></canvas>
        <button type="button" class="line-clear" id="clear-trace" aria-label="윗줄 지우기">🧽</button>
      </div>
      <div class="note-line" id="line-free">
        <span class="line-tag free" id="tag-free">혼자 써요</span>
        <canvas id="ink-free"></canvas>
        <button type="button" class="line-clear" id="clear-free" aria-label="아랫줄 지우기">🧽</button>
      </div>
    </div>
    <div class="dict-check" id="dict-check">
      <span class="dc-msg">정답이랑 똑같이 썼는지 비교해 보세요!</span>
      <button type="button" class="bigbtn" id="dict-retry">✏️ 다시 쓸래</button>
      <button type="button" class="bigbtn primary" id="dict-ok">⭕ 맞았어요!</button>
    </div>
    <div class="toolbar">
      <div class="swatches" id="swatches"></div>
      <button type="button" class="bigbtn" id="btn-eraser">🧼 지우개</button>
      <button type="button" class="bigbtn" id="btn-undo">↩️ 한 획</button>
    </div>
  </div>
</section>

<!-- 자유 낙서장 -->
<section class="screen" id="scr-draw">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2>🎨 자유 낙서장</h2>
    <button type="button" class="bigbtn primary" id="btn-draw-save">💾 보관하기</button>
  </header>
  <div class="draw-tools">
    <div class="swatches" id="draw-swatches"></div>
    <div class="pens">
      <button type="button" class="pen-btn" data-pen="thin" aria-label="가는 펜">✏️</button>
      <button type="button" class="pen-btn on" data-pen="mid" aria-label="보통 펜">🖊️</button>
      <button type="button" class="pen-btn" data-pen="thick" aria-label="굵은 크레용">🖍️</button>
      <button type="button" class="pen-btn" data-pen="hl" aria-label="형광펜">🖌️</button>
    </div>
    <button type="button" class="bigbtn" id="btn-draw-sticker">🌟 스티커</button>
    <button type="button" class="bigbtn" id="btn-draw-eraser">🧼 지우개</button>
    <button type="button" class="bigbtn" id="btn-draw-undo">↩️</button>
    <button type="button" class="bigbtn" id="btn-draw-clear">🗑️</button>
  </div>
  <div class="sticker-row" id="sticker-row" hidden></div>
  <div class="draw-holder">
    <canvas id="draw-pad"></canvas>
  </div>
</section>

<!-- 갤러리 -->
<section class="screen" id="scr-gallery">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2>🖼️ 내 글씨</h2>
    <span class="stat" id="gallery-count">0장</span>
  </header>
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<!-- 보상 오버레이 -->
<div class="reward" id="reward">
  <div class="reward-card">
    <div class="reward-stars">⭐</div>
    <div class="reward-praise" id="reward-praise">참 잘했어요!</div>
    <div class="reward-btns">
      <button type="button" class="bigbtn" id="reward-again">한 번 더 ✏️</button>
      <button type="button" class="bigbtn primary" id="reward-next">다음 ▶</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/ask.js"></script>
<script src="js/ink.js"></script>
<script src="js/app.js"></script>
<script src="../shared/voice-settings.js"></script>
</body>
</html>
