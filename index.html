<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFD9E6">
<title>은아의 놀이터</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; }
body {
  background: linear-gradient(160deg, #FFE3EE 0%, #EFE4FC 50%, #D8F4FF 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(18px, 4vmin, 40px);
  padding: 20px;
  user-select: none;
}
h1 {
  font-size: clamp(28px, 6.5vmin, 52px);
  font-weight: 900;
  color: #6E4A8C;
  text-shadow: 0 2px 0 rgba(255,255,255,.8);
  text-align: center;
}
.apps { display: flex; gap: clamp(14px, 3.5vmin, 36px); flex-wrap: wrap; justify-content: center; }
.app-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: clamp(220px, 40vmin, 320px);
  padding: clamp(20px, 4vmin, 36px);
  border-radius: 32px;
  background: #fff;
  box-shadow: 0 10px 0 rgba(0,0,0,.1);
  text-decoration: none;
  transition: transform .12s;
}
.app-card:active { transform: scale(.95); }
.app-card img { width: 70%; border-radius: 26%; }
.app-name { font-size: clamp(20px, 4vmin, 30px); font-weight: 900; color: #4A3F22; }
.app-desc { font-size: clamp(13px, 2.6vmin, 17px); font-weight: 700; color: #9C8FB8; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<h1>🌈 은아의 놀이터</h1>
<div class="apps">
  <a class="app-card" href="./play/">
    <img src="./play/icon-192.png" alt="찾기 놀이터 보라 토끼">
    <span class="app-name">🔍 찾기 놀이터</span>
    <span class="app-desc">숨은그림 · 다른그림<br>글자 찾기 · 스티커 놀이</span>
  </a>
  <a class="app-card" href="./english/">
    <img src="./english/icon-192.png" alt="영어 놀이터 핑크 토끼">
    <span class="app-name">🗣️ 영어 놀이터</span>
    <span class="app-desc">토끼에게 물어보면<br>영어로 대답해줘요</span>
  </a>
  <a class="app-card" href="./color/">
    <img src="./color/icon-192.png" alt="색칠 놀이터 팔레트와 붓">
    <span class="app-name">🎨 색칠 놀이터</span>
    <span class="app-desc">숫자를 따라 콕콕<br>그림을 완성해요</span>
  </a>
</div>
</body>
</html>
