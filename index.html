<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFD9E6">
<title>은아와 서하의 놀이터</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="./shared/pet.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  /* height 고정 + 세로 중앙 정렬은 내용이 화면보다 길어지면 위아래가 잘리고
     스크롤이 막힌다. min-height + .wrap의 margin:auto 로 스크롤 가능한 중앙 정렬. */
  min-height: 100%;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  background: linear-gradient(160deg, #FFE3EE 0%, #EFE4FC 50%, #D8F4FF 100%);
  display: flex;
  user-select: none;
}
.wrap {
  margin: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(18px, 4vmin, 40px);
  padding: 20px 16px calc(24px + env(safe-area-inset-bottom));
  width: 100%;
}
h1 {
  font-size: clamp(28px, 6.5vmin, 52px);
  font-weight: 900;
  color: #6E4A8C;
  text-shadow: 0 2px 0 rgba(255,255,255,.8);
  text-align: center;
}
.apps {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: clamp(12px, 3vmin, 36px);
  width: 100%;
  max-width: 1040px;
}
.app-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  /* 폰에서는 42vw로 두 장씩, 넓은 화면에서는 최대 300px */
  width: clamp(150px, 42vw, 300px);
  padding: clamp(14px, 3.4vmin, 32px) clamp(10px, 2.4vmin, 28px);
  border-radius: 32px;
  background: #fff;
  box-shadow: 0 10px 0 rgba(0,0,0,.1);
  text-decoration: none;
  transition: transform .12s;
}
.app-card:active { transform: scale(.95); }
.app-card[hidden] { display: none; } /* hidden 속성이 위 display:flex에 밀리지 않게 */
.app-card img { width: 70%; border-radius: 26%; }
.app-name { font-size: clamp(16px, 4vmin, 28px); font-weight: 900; color: #4A3F22; white-space: nowrap; }
.app-desc { font-size: clamp(11px, 2.6vmin, 16px); font-weight: 700; color: #9C8FB8; text-align: center; line-height: 1.5; }
/* 잠긴 카드(일본어 — 한글 카드 10장을 모으면 열림) */
.app-card.locked { position: relative; opacity: .75; }
.app-card.locked img { filter: grayscale(.9); }
.lock-badge {
  position: absolute;
  top: 10px; right: 12px;
  font-size: clamp(20px, 4.5vmin, 34px);
}
@keyframes card-nope {
  0%, 100% { transform: translateX(0); }
  25%, 75% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
}
.app-card.nope { animation: card-nope .4s; }
.parent-link {
  font-size: clamp(12px, 2.6vmin, 16px);
  font-weight: 700;
  color: #B3A6CC;
  text-decoration: none;
  padding: 8px 14px;
}
/* 누가 놀 건지 고르기 (은아·서하) */
.profiles { display: flex; gap: clamp(10px, 2.6vmin, 20px); }
.profile-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  border: 4px solid transparent;
  cursor: pointer;
  padding: clamp(8px, 2vmin, 14px) clamp(16px, 3.6vmin, 30px);
  border-radius: 999px;
  background: rgba(255,255,255,.75);
  font-family: inherit;
  font-size: clamp(17px, 4.2vmin, 28px);
  font-weight: 900;
  color: #6E4A8C;
  box-shadow: 0 6px 0 rgba(0,0,0,.08);
  transition: transform .12s;
}
.profile-btn:active { transform: scale(.94); }
.profile-btn .p-emoji { font-size: clamp(24px, 5.6vmin, 40px); }
.profile-btn.sel {
  background: #fff;
  border-color: #FFB800;
  box-shadow: 0 6px 0 rgba(255,184,0,.35);
}
.profile-btn.sel::after { content: '✔'; color: #FFB800; font-size: .8em; }
</style>
</head>
<body>
<div class="wrap">
<h1>🌈 은아와 서하의 놀이터</h1>
<div class="profiles" id="profile-picker"><!-- 스크립트가 은아·서하 버튼 생성 --></div>
<div class="apps">
  <a class="app-card" href="./play/">
    <img src="./play/icon-192.png" alt="찾기 놀이터 보라 토끼">
    <span class="app-name">🔍 찾기 놀이터</span>
    <span class="app-desc">숨은그림 · 다른그림<br>글자 찾기 · 스티커 놀이</span>
  </a>
  <a class="app-card" href="./english/">
    <img src="./english/icon-192.png" alt="영어 놀이터 핑크 토끼">
    <span class="app-name">🗣️ 영어 놀이터</span>
    <span class="app-desc">토끼에게 물어보면<br>영어로 대답해줘요</span>
  </a>
  <a class="app-card" href="./pixel/">
    <img src="./pixel/icon-192.png" alt="픽셀 놀이터 픽셀 토끼">
    <span class="app-name">🧩 픽셀 놀이터</span>
    <span class="app-desc">숫자 픽셀을 쓱쓱<br>그림이 짠! 나타나요</span>
  </a>
  <a class="app-card" href="./hangul/">
    <img src="./hangul/icon-192.png" alt="가나다 한글 놀이터 연필 든 초록 토끼">
    <span class="app-name">🌟 한글 놀이터</span>
    <span class="app-desc">ㄱㄴㄷ 소리 · 따라쓰기<br>한글 게임 · 낱말 카드</span>
  </a>
  <a class="app-card" href="./japanese/">
    <img src="./japanese/icon-192.png" alt="일본어 놀이터 벚꽃 든 흰 토끼">
    <span class="app-name">🌸 일본어 놀이터</span>
    <span class="app-desc">あいうえお 소리 · 따라쓰기<br>히라가나 게임 · 낱말 카드</span>
  </a>
  <a class="app-card" href="./write/">
    <img src="./write/icon-192.png" alt="글씨 놀이터 연필 든 파란 토끼">
    <span class="app-name">✍️ 글씨 놀이터</span>
    <span class="app-desc">펜슬로 따라 쓰고<br>혼자 써 봐요</span>
  </a>
  <a class="app-card" href="./math/">
    <img src="./math/icon-192.png" alt="산수 놀이터 숫자 블록 든 주황 토끼">
    <span class="app-name">🔢 산수 놀이터</span>
    <span class="app-desc">숫자 따라 쓰고<br>그림으로 셈해요</span>
  </a>
  <a class="app-card" href="./practika/" id="card-practika" hidden>
    <img src="./practika/icon-192.png" alt="프랙티카 놀이터 헤드셋 낀 보라 튜터">
    <span class="app-name">🎙️ 프랙티카 놀이터</span>
    <span class="app-desc">AI 튜터와 영·일·중 대화<br>말하기 연습 · 어휘 복습</span>
  </a>
</div>
<a class="parent-link" href="./parent/">🔑 부모님 페이지</a>
</div>
<script>window.EnjoyProfileBadge = false; /* 홈엔 선택 버튼이 있어 배지 생략 */</script>
<script src="./shared/profile.js"></script>
<script src="./shared/parent-settings.js"></script>
<script>
(() => {
  // ── 글을 못 읽는 아이를 위해: 카드를 누르면 앱 이름을 말해 준 뒤 이동한다 ──
  function speak(text) {
    if (!window.speechSynthesis) return 0;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR';
      u.rate = 1.0;
      u.pitch = 1.15;
      const vs = speechSynthesis.getVoices().filter(v => v.lang && v.lang.replace('_', '-').toLowerCase().indexOf('ko') === 0);
      if (vs.length) {
        let uri = null;
        try { uri = localStorage.getItem('enjoy-voice-ko'); } catch (e) {}
        u.voice = vs.find(v => v.voiceURI === uri) || vs[0];
      }
      speechSynthesis.speak(u);
      return 1;
    } catch (e) { return 0; }
  }
  function koName(card) {
    // "🔍 찾기 놀이터" → "찾기 놀이터" (이모지는 읽지 않게)
    const el = card.querySelector('.app-name');
    return el ? el.textContent.replace(/[^가-힣0-9 ]/g, '').trim() : '';
  }

  // ── 누가 놀 건지 고르기 (은아·서하) — 진행도가 아이별로 나뉜다 ──
  const picker = document.getElementById('profile-picker');
  Profile.LIST.forEach(p => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'profile-btn' + (p.id === Profile.current() ? ' sel' : '');
    b.innerHTML = '<span class="p-emoji">' + p.emoji + '</span>' + p.name;
    b.addEventListener('click', () => {
      if (p.id === Profile.current()) { speak(p.name + ', 어서 와!'); return; }
      Profile.set(p.id);
      speak(p.name + ', 어서 와!');
      // 아이별 진행도(일본어 잠금 등)를 다시 반영하기 위해 새로고침
      setTimeout(() => location.reload(), 900);
    });
    picker.appendChild(b);
  });

  // ── 프랙티카: 회화 내용이 5세엔 어려워 부모가 허용할 때만 보여준다 ──
  if (window.ParentSettings && ParentSettings.get('showPractika')) {
    document.getElementById('card-practika').hidden = false;
  }

  // ── 일본어: 한글 낱말 카드 10장을 모으면 열림 (부모가 바로 열어줄 수도 있음) ──
  const jaCard = document.querySelector('a[href="./japanese/"]');
  const jaLocked = window.ParentSettings && !ParentSettings.japaneseUnlocked();
  if (jaCard && jaLocked) {
    jaCard.classList.add('locked');
    jaCard.insertAdjacentHTML('beforeend', '<span class="lock-badge">🔒</span>');
  }

  document.querySelectorAll('.app-card').forEach(card => {
    card.addEventListener('click', e => {
      e.preventDefault();
      if (card.classList.contains('locked')) {
        card.classList.remove('nope');
        void card.offsetWidth;
        card.classList.add('nope');
        speak('한글 놀이터에서 낱말 카드를 열 장 모으면 열려요!');
        return;
      }
      const spoke = speak(koName(card));
      setTimeout(() => { location.href = card.href; }, spoke ? 900 : 0);
    });
  });
})();
</script>
<script src="./shared/sw-register.js"></script>
<!-- 학습 펫 — 오른쪽 아래 떠 있는 버튼으로 등장 -->
<script src="./shared/pet-avatar.js"></script>
<script src="./shared/pet.js"></script>
</body>
</html>
