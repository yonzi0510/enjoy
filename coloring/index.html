<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FCE7F1">
<title>색칠공부</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/voice-settings.css">
<link rel="stylesheet" href="../shared/time-limit.css">
<link rel="stylesheet" href="../shared/pet.css">
</head>
<body>

<!-- 홈: 그림 고르기 -->
<section class="screen on" id="scr-home">
  <header class="home-head">
    <h1>🎨 색칠공부</h1>
    <div class="stats">
      <span class="stat">⭐ <b id="home-stars">0</b></span>
      <button type="button" id="btn-gallery" class="vs-btn" aria-label="갤러리">🖼️<b id="gallery-badge" class="mini-badge">0</b></button>
      <a href="../" class="vs-btn" style="text-decoration:none" aria-label="메인 놀이터로">🏠</a>
      <span id="pet-slot"></span>
      <button type="button" id="btn-voice" class="vs-btn" aria-label="목소리 설정">🗣️</button>
    </div>
  </header>
  <div class="cat-chips" id="cat-chips"></div>
  <div class="pic-grid" id="pic-grid"></div>
</section>

<!-- 색칠하기 -->
<section class="screen" id="scr-paint">
  <header class="bar">
    <button type="button" class="back" id="btn-paint-back">◀</button>
    <h2 id="paint-title">🎨 색칠하기</h2>
  </header>
  <div class="paint-stage">
    <div class="canvas-wrap">
      <canvas id="paint-canvas" aria-label="색칠 그림판"></canvas>
    </div>
    <div class="paint-tools">
      <div class="palette" id="palette"></div>
      <div class="tool-row">
        <button type="button" class="tool-btn" data-tool="fill" aria-label="물통 채우기">🪣</button>
        <button type="button" class="tool-btn" data-tool="crayon" aria-label="크레용">🖍️</button>
        <button type="button" class="tool-btn" data-tool="erase" aria-label="지우개">🧽</button>
      </div>
      <div class="size-row" id="size-row" aria-label="크레용 굵기"></div>
      <div class="act-row">
        <button type="button" class="act-btn" id="btn-undo" aria-label="되돌리기">↩️</button>
        <button type="button" class="act-btn" id="btn-clear" aria-label="전체 지우기">🗑️</button>
        <button type="button" class="act-btn save" id="btn-save" aria-label="보관하기">💾</button>
      </div>
    </div>
  </div>
</section>

<!-- 갤러리 -->
<section class="screen" id="scr-gallery">
  <header class="bar">
    <button type="button" class="back" id="btn-gallery-back">◀</button>
    <h2>🖼️ 내 갤러리</h2>
    <span class="page-count" id="gallery-count">0장</span>
  </header>
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<!-- 색종이 축하 -->
<div class="confetti" id="confetti"></div>

<!-- 보상 오버레이 -->
<div class="reward" id="reward">
  <div class="reward-card">
    <div class="reward-stars">⭐</div>
    <div class="reward-praise" id="reward-praise">참 잘했어요!</div>
    <div class="reward-btns">
      <button type="button" class="bigbtn" id="reward-close" hidden>그만할래</button>
      <button type="button" class="bigbtn primary" id="reward-next">다음 ▶</button>
    </div>
  </div>
</div>

<script src="../shared/profile.js"></script>
<script src="js/pictures.js"></script>
<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/paint.js"></script>
<script src="js/app.js"></script>
<script src="../shared/parent-settings.js"></script>
<script src="../shared/voice-settings.js"></script>
<script src="../shared/pet-avatar.js"></script>
<script src="../shared/pet.js"></script>
<script src="../shared/time-limit.js"></script>
<script src="../shared/sw-register.js"></script>
</body>
</html>
