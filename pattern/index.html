<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#D6F1EE">
<title>패턴 놀이터</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/voice-settings.css">
<link rel="stylesheet" href="../shared/time-limit.css">
<link rel="stylesheet" href="../shared/pet.css">
</head>
<body>

<!-- 홈 -->
<section class="screen on" id="scr-home">
  <header class="home-head">
    <h1>🔁 패턴 놀이터</h1>
    <div class="stats">
      <span class="stat">⭐ <b id="home-stars">0</b></span>
      <a href="../" class="vs-btn" style="text-decoration:none" aria-label="메인 놀이터로">🏠</a>
      <span id="pet-slot"></span>
      <button type="button" id="btn-voice" class="vs-btn" aria-label="목소리 설정">🗣️</button>
    </div>
  </header>
  <div class="menu" id="menu"></div>
</section>

<!-- 퍼즐 목록 -->
<section class="screen" id="scr-list">
  <header class="bar">
    <button type="button" class="back" data-go="scr-home">◀</button>
    <h2 id="list-title">🔁 이어가기</h2>
    <span class="page-count" id="list-count">0 / 10</span>
  </header>
  <div class="puzzle-list" id="list"></div>
</section>

<!-- 놀이(빈칸 채우기) -->
<section class="screen" id="scr-play">
  <header class="bar">
    <button type="button" class="back" id="btn-play-back">◀</button>
    <h2 id="play-title">🔁 패턴 완성</h2>
    <button type="button" class="bigbtn small" id="btn-listen">🔊 듣기</button>
  </header>
  <div class="play-stage" id="play-stage">
    <!-- 패턴 줄(가로) -->
    <div class="strip-wrap">
      <div class="strip" id="strip"></div>
    </div>
    <!-- 타일 트레이 -->
    <div class="tray" id="tray"></div>
  </div>
  <!-- 드래그 중 따라다니는 타일 -->
  <div class="drag-ghost" id="drag-ghost" hidden></div>
</section>

<!-- 보상 오버레이 -->
<div class="reward" id="reward">
  <div class="reward-card">
    <div class="reward-emoji" id="reward-emoji">🎉</div>
    <div class="reward-praise" id="reward-praise">참 잘했어요!</div>
    <div class="reward-btns">
      <button type="button" class="bigbtn" id="reward-close">그만할래</button>
      <button type="button" class="bigbtn primary" id="reward-next">다음 ▶</button>
    </div>
  </div>
</div>

<!-- 색종이 축하 -->
<div class="confetti" id="confetti" aria-hidden="true"></div>

<script src="../shared/profile.js"></script>
<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/app.js"></script>
<script src="../shared/parent-settings.js"></script>
<script src="../shared/voice-settings.js"></script>
<script src="../shared/pet-avatar.js"></script>
<script src="../shared/pet.js"></script>
<script src="../shared/time-limit.js"></script>
<script src="../shared/sw-register.js"></script>
</body>
</html>
