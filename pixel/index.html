<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4DC98F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>픽셀 놀이터</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="../shared/voice-settings.css">
<link rel="stylesheet" href="../shared/time-limit.css">
<link rel="stylesheet" href="../shared/pet.css">
</head>
<body>

<!-- ═══════════ 홈(갤러리) 화면 ═══════════ -->
<div id="screen-home" class="screen active">
  <header class="home-header">
    <h1 class="app-title"><span class="title-emoji">🧩</span> 픽셀 놀이터</h1>
    <div class="header-btns">
      <a href="../" class="round-btn" style="text-decoration:none" aria-label="메인 놀이터로">🏠</a>
      <span id="pet-slot"></span>
      <button id="btn-voice" class="round-btn" aria-label="목소리 설정">🗣️</button>
      <button id="btn-works" class="round-btn" aria-label="내 작품">🖼️</button>
      <button id="btn-mute" class="round-btn" aria-label="소리 켜기/끄기">🔊</button>
    </div>
  </header>
  <div id="cat-chips" class="cat-chips"><!-- 엔진이 카테고리 칩 생성 --></div>
  <div id="pic-grid" class="pic-grid"><!-- 엔진이 도안 카드 생성 --></div>
</div>

<!-- ═══════════ 채색 화면 ═══════════ -->
<div id="screen-paint" class="screen">
  <header class="game-header">
    <button id="paint-back" class="round-btn" aria-label="뒤로가기">🏠</button>
    <div id="paint-title" class="game-title"></div>
    <div class="header-btns">
      <button id="paint-fit" class="round-btn" aria-label="전체 보기">⛶</button>
      <button id="paint-mute" class="round-btn" aria-label="소리 켜기/끄기">🔊</button>
    </div>
  </header>

  <div id="canvas-wrap" class="canvas-wrap">
    <canvas id="paint-canvas"></canvas>
    <div id="bomb-hint" class="bomb-hint hidden">💣 채우고 싶은 곳을 콕! 눌러 주세요</div>
  </div>

  <div id="paint-bottom" class="paint-bottom">
    <div id="progress-label" class="progress-label"></div>
    <div class="palette-row">
      <div class="booster-bar">
        <button id="btn-bomb" class="booster-btn" aria-label="폭탄">💣<span id="bomb-count" class="booster-count"></span></button>
        <button id="btn-wand" class="booster-btn" aria-label="마법봉">🪄<span id="wand-count" class="booster-count"></span></button>
      </div>
      <div id="palette-bar" class="palette-bar"><!-- 엔진이 팔레트 버튼 생성 --></div>
    </div>
    <div id="viewer-bar" class="viewer-bar hidden">
      <button id="btn-repaint" class="big-btn btn-primary">🖌️ 다시 색칠하기</button>
    </div>
  </div>
</div>

<!-- ═══════════ 완성 오버레이 ═══════════ -->
<div id="complete-overlay" class="overlay hidden">
  <div id="confetti-box"></div>
  <div class="complete-card">
    <div class="complete-title">🎉 완성!</div>
    <div class="complete-thumb"><canvas id="complete-canvas"></canvas></div>
    <div id="complete-name" class="complete-name"></div>
    <div class="complete-btns">
      <button id="complete-home" class="big-btn btn-soft">🏠</button>
      <button id="complete-works" class="big-btn btn-soft">🖼️ 내 작품</button>
      <button id="complete-next" class="big-btn btn-primary">다음 그림 ▶</button>
    </div>
  </div>
</div>

<!-- ═══════════ 다시 색칠 확인 오버레이 ═══════════ -->
<div id="confirm-overlay" class="overlay hidden">
  <div class="confirm-card">
    <div class="confirm-text">완성한 그림을 지우고<br>처음부터 다시 색칠할까요?</div>
    <div class="complete-btns">
      <button id="confirm-cancel" class="big-btn btn-soft">아니요</button>
      <button id="confirm-ok" class="big-btn btn-primary">네, 다시!</button>
    </div>
  </div>
</div>

<!-- ═══════════ 내 작품 화면 ═══════════ -->
<div id="screen-works" class="screen">
  <header class="home-header">
    <button id="works-back" class="round-btn" aria-label="뒤로가기">🏠</button>
    <h1 class="app-title"><span class="title-emoji">🖼️</span> 내 작품</h1>
    <div style="width:56px"></div>
  </header>
  <div id="works-grid" class="pic-grid"><!-- 엔진이 완성작 카드 생성 --></div>
</div>
